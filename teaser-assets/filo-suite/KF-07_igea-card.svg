<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="iGlow" cx="90%" cy="10%" r="45%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.13"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#22D3EE" stroke-opacity="0.10" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="#030303"/>

  <g transform="translate(520 240)">
    <rect width="880" height="540" rx="20" fill="#0A0A0A" stroke="#ffffff" stroke-opacity="0.05"/>
    <rect width="880" height="540" rx="20" fill="url(#iGlow)"/>

    <g transform="translate(36 34)" font-family="Inter, sans-serif">
      <text font-size="20" font-weight="600" fill="#ffffff" y="24">Igea</text>
      <text y="52" font-size="11" fill="#ffffff" fill-opacity="0.4" letter-spacing="0.2em">CLINICHE · FISIOTERAPISTI · DENTISTI</text>

      <!-- In arrivo pill top-right -->
      <g transform="translate(688 -4)">
        <rect width="120" height="28" rx="14" fill="#22D3EE" fill-opacity="0.08" stroke="#22D3EE" stroke-opacity="0.35"/>
        <circle cx="16" cy="14" r="3.5" fill="#22D3EE"/>
        <text x="28" y="19" font-size="12" font-weight="600" fill="#22D3EE">In arrivo</text>
      </g>
    </g>

    <!-- Diagnostic grid pattern -->
    <g transform="translate(60 140)">
      <rect width="760" height="340" rx="14" fill="url(#grid)" stroke="#22D3EE" stroke-opacity="0.08"/>
      <!-- cross motif -->
      <g transform="translate(380 170)" stroke="#22D3EE" stroke-opacity="0.25">
        <line x1="-60" y1="0" x2="60" y2="0" stroke-width="1.5"/>
        <line x1="0" y1="-60" x2="0" y2="60" stroke-width="1.5"/>
        <circle r="6" fill="#22D3EE" fill-opacity="0.25"/>
      </g>
      <text x="380" y="320" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.2em">INTERFACCIA MEDICA · ANTEPRIMA</text>
    </g>
  </g>

  <g transform="translate(160 880)" font-family="Inter, sans-serif">
    <text font-size="56" font-weight="700" fill="#ffffff" letter-spacing="-0.02em">Igea</text>
    <text y="56" font-size="20" fill="#ffffff" fill-opacity="0.55">Per cliniche e studi medici. In arrivo.</text>
  </g>
</svg>
