<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="#030303"/>
  <ellipse cx="960" cy="540" rx="520" ry="260" fill="url(#glow)"/>

  <!-- NOTE: replace the two <image> refs with /public/Brand/filo_brand_symbol.svg
       and /public/Brand/filo_brand_wordmark.svg at render time. -->
  <g transform="translate(780 470)">
    <image href="../../public/Brand/filo_brand_symbol.svg" width="150" height="135" preserveAspectRatio="xMidYMid meet"/>
    <image href="../../public/Brand/filo_brand_wordmark.svg" x="195" y="20" width="360" height="95" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <rect x="0" y="740" width="1920" height="2" fill="url(#line)" opacity="0.6"/>
</svg>
