<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="gGlow" cx="90%" cy="10%" r="40%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.14"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aGlow" cx="90%" cy="10%" r="40%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.18"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="#030303"/>

  <!-- Galatea card exiting to left (40% out of frame) -->
  <g transform="translate(-280 200)" opacity="0.7">
    <rect width="1080" height="620" rx="20" fill="#0A0A0A" stroke="#ffffff" stroke-opacity="0.05"/>
    <rect width="1080" height="620" rx="20" fill="url(#gGlow)"/>
    <g transform="translate(36 34)" font-family="Inter, sans-serif">
      <text font-size="20" font-weight="600" fill="#ffffff" y="24">Galatea</text>
      <text y="52" font-size="11" fill="#ffffff" fill-opacity="0.4" letter-spacing="0.2em">SALONI · ESTETICA · BARBIERI</text>
    </g>
  </g>

  <!-- Atlas card entering from right (60% into frame) -->
  <g transform="translate(1120 200)">
    <rect width="1080" height="620" rx="20" fill="#0A0A0A" stroke="#ffffff" stroke-opacity="0.05"/>
    <rect width="1080" height="620" rx="20" fill="url(#aGlow)"/>
    <g transform="translate(36 34)" font-family="Inter, sans-serif">
      <text font-size="20" font-weight="600" fill="#ffffff" y="24">Atlas</text>
      <g transform="translate(100 4)">
        <rect width="120" height="26" rx="13" fill="#6366F1" fill-opacity="0.08" stroke="#6366F1" stroke-opacity="0.3"/>
        <circle cx="14" cy="13" r="3.5" fill="#6366F1"/>
        <text x="26" y="18" font-size="12" font-weight="600" fill="#6366F1">Disponibile</text>
      </g>
      <text y="52" font-size="11" fill="#ffffff" fill-opacity="0.4" letter-spacing="0.2em">PRESENZA DIGITALE · LEAD GENERATION</text>
    </g>
  </g>
</svg>
