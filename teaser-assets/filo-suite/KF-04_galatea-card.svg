<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="gGlow" cx="90%" cy="10%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#070707" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="#030303"/>

  <!-- Card shell -->
  <g transform="translate(420 200)">
    <rect width="1080" height="620" rx="20" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.05"/>
    <rect width="1080" height="620" rx="20" fill="url(#gGlow)"/>

    <!-- Top bar: product + pill -->
    <g transform="translate(36 34)" font-family="Inter, sans-serif">
      <text x="0" y="24" font-size="20" font-weight="600" fill="#ffffff">Galatea</text>
      <g transform="translate(120 4)">
        <rect width="130" height="26" rx="13" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-opacity="0.3"/>
        <circle cx="14" cy="13" r="3.5" fill="#10B981"/>
        <text x="26" y="18" font-size="12" font-weight="600" fill="#10B981">Più richiesto</text>
      </g>
      <text x="0" y="52" font-size="11" fill="#ffffff" fill-opacity="0.4" letter-spacing="0.2em">SALONI · ESTETICA · BARBIERI</text>
    </g>

    <!-- Mini dashboard rows -->
    <g transform="translate(36 130)" font-family="Inter, sans-serif">
      <text x="0" y="0" font-size="14" font-weight="600" fill="#ffffff" fill-opacity="0.8">Agenda di Oggi</text>
      <text x="0" y="22" font-size="12" fill="#ffffff" fill-opacity="0.5">Oggi · 14 appuntamenti gestiti da Galatea</text>

      <!-- Row 1 confermato -->
      <g transform="translate(0 50)">
        <rect width="640" height="64" rx="12" fill="#ffffff" fill-opacity="0.025" stroke="#ffffff" stroke-opacity="0.05"/>
        <rect width="4" height="64" rx="2" fill="#10B981" fill-opacity="0.5"/>
        <text x="20" y="28" font-size="13" font-weight="500" fill="#ffffff">Giulia Bianchi</text>
        <text x="20" y="48" font-size="11" fill="#ffffff" fill-opacity="0.5">Balayage + Piega</text>
        <text x="620" y="28" font-size="11" text-anchor="end" font-family="ui-monospace, monospace" fill="#ffffff" fill-opacity="0.4">09:30</text>
        <rect x="480" y="36" width="140" height="20" rx="10" fill="#10B981" fill-opacity="0.1"/>
        <text x="550" y="50" font-size="10" text-anchor="middle" fill="#10B981">In Salone</text>
      </g>
      <!-- Row 2 -->
      <g transform="translate(0 126)">
        <rect width="640" height="64" rx="12" fill="#ffffff" fill-opacity="0.025" stroke="#ffffff" stroke-opacity="0.05"/>
        <rect width="4" height="64" rx="2" fill="#10B981" fill-opacity="0.5"/>
        <text x="20" y="28" font-size="13" font-weight="500" fill="#ffffff">Marco Verdi</text>
        <text x="20" y="48" font-size="11" fill="#ffffff" fill-opacity="0.5">Taglio Uomo</text>
        <text x="620" y="28" font-size="11" text-anchor="end" font-family="ui-monospace, monospace" fill="#ffffff" fill-opacity="0.4">11:15</text>
        <rect x="450" y="36" width="170" height="20" rx="10" fill="#10B981" fill-opacity="0.1"/>
        <text x="535" y="50" font-size="10" text-anchor="middle" fill="#10B981">Confermato via WA</text>
      </g>
      <!-- Row 3 pending -->
      <g transform="translate(0 202)">
        <rect width="640" height="64" rx="12" fill="#ffffff" fill-opacity="0.025" stroke="#ffffff" stroke-opacity="0.05"/>
        <text x="20" y="28" font-size="13" font-weight="500" fill="#ffffff">Elena F.</text>
        <text x="20" y="48" font-size="11" fill="#ffffff" fill-opacity="0.5">Consulenza Extension</text>
        <text x="620" y="28" font-size="11" text-anchor="end" font-family="ui-monospace, monospace" fill="#ffffff" fill-opacity="0.4">14:00</text>
        <rect x="440" y="36" width="180" height="20" rx="10" fill="#F59E0B" fill-opacity="0.12"/>
        <text x="530" y="50" font-size="10" text-anchor="middle" fill="#F59E0B">In attesa di risposta</text>
      </g>
    </g>

    <!-- Right-hand spinning ring decorative -->
    <g transform="translate(760 170)">
      <circle cx="130" cy="130" r="118" fill="none" stroke="#10B981" stroke-opacity="0.15"/>
      <circle cx="130" cy="130" r="75" fill="#10B981" fill-opacity="0.04" stroke="#10B981" stroke-opacity="0.10"/>
      <text x="130" y="135" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#10B981" fill-opacity="0.6">AI Assistant</text>
      <text x="130" y="155" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff" fill-opacity="0.4" letter-spacing="0.2em">ATTIVO</text>
    </g>
  </g>

  <!-- Overlay headline bottom-left of frame -->
  <g transform="translate(160 880)" font-family="Inter, sans-serif">
    <text font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-0.02em">Galatea</text>
    <text y="60" font-size="22" fill="#ffffff" fill-opacity="0.6">Il cuore operativo.</text>
  </g>
</svg>
