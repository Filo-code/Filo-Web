<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="sGlow" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="#030303"/>
  <rect width="1920" height="1080" fill="url(#sGlow)"/>

  <g font-family="Inter, sans-serif" text-anchor="middle">
    <text x="960" y="140" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-0.03em">Filò</text>
    <text x="960" y="180" font-size="14" fill="#ffffff" fill-opacity="0.45" letter-spacing="0.3em">L'ECOSISTEMA</text>
  </g>

  <!-- 4 tiles grid -->
  <g transform="translate(160 280)" font-family="Inter, sans-serif">
    <!-- Galatea -->
    <g>
      <rect width="760" height="320" rx="18" fill="#0A0A0A" stroke="#10B981" stroke-opacity="0.25"/>
      <rect width="760" height="320" rx="18" fill="#10B981" fill-opacity="0.04"/>
      <text x="36" y="60" font-size="28" font-weight="700" fill="#ffffff">Galatea</text>
      <g transform="translate(170 40)">
        <rect width="140" height="26" rx="13" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-opacity="0.35"/>
        <text x="70" y="18" font-size="11" font-weight="600" fill="#10B981" text-anchor="middle">Più richiesto</text>
      </g>
      <text x="36" y="92" font-size="12" fill="#ffffff" fill-opacity="0.4" letter-spacing="0.2em">SALONI · ESTETICA · BARBIERI</text>
      <text x="36" y="160" font-size="22" fill="#ffffff" fill-opacity="0.75">Il cuore operativo.</text>
      <text x="36" y="200" font-size="14" fill="#ffffff" fill-opacity="0.5">Agenda, chat, promemoria e follow-up gestiti in automatico.</text>
      <g transform="translate(36 240)">
        <rect width="300" height="40" rx="20" fill="#10B981" fill-opacity="0.12" stroke="#10B981" stroke-opacity="0.3"/>
        <text x="150" y="26" font-size="13" font-weight="600" fill="#10B981" text-anchor="middle">Disponibile · con AI Assistant</text>
      </g>
    </g>

    <!-- Atlas -->
    <g transform="translate(840 0)">
      <rect width="760" height="320" rx="18" fill="#0A0A0A" stroke="#6366F1" stroke-opacity="0.25"/>
      <rect width="760" height="320" rx="18" fill="#6366F1" fill-opacity="0.04"/>
      <text x="36" y="60" font-size="28" font-weight="700" fill="#ffffff">Atlas</text>
      <g transform="translate(130 40)">
        <rect width="130" height="26" rx="13" fill="#6366F1" fill-opacity="0.1" stroke="#6366F1" stroke-opacity="0.35"/>
        <text x="65" y="18" font-size="11" font-weight="600" fill="#6366F1" text-anchor="middle">Disponibile</text>
      </g>
      <text x="36" y="92" font-size="12" fill="#ffffff" fill-opacity="0.4" letter-spacing="0.2em">PRESENZA DIGITALE · LEAD GEN</text>
      <text x="36" y="160" font-size="22" fill="#ffffff" fill-opacity="0.75">Presenza che converte.</text>
      <text x="36" y="200" font-size="14" fill="#ffffff" fill-opacity="0.5">Landing strategica, funnel, CRM per trasformare traffico in clienti.</text>
      <g transform="translate(36 240)">
        <rect width="220" height="40" rx="20" fill="#6366F1" fill-opacity="0.12" stroke="#6366F1" stroke-opacity="0.3"/>
        <text x="110" y="26" font-size="13" font-weight="600" fill="#6366F1" text-anchor="middle">Disponibile</text>
      </g>
    </g>

    <!-- Igea -->
    <g transform="translate(0 360)" opacity="0.7">
      <rect width="760" height="320" rx="18" fill="#0A0A0A" stroke="#22D3EE" stroke-opacity="0.2"/>
      <rect width="760" height="320" rx="18" fill="#22D3EE" fill-opacity="0.03"/>
      <text x="36" y="60" font-size="28" font-weight="700" fill="#ffffff">Igea</text>
      <g transform="translate(120 40)">
        <rect width="120" height="26" rx="13" fill="#22D3EE" fill-opacity="0.08" stroke="#22D3EE" stroke-opacity="0.3"/>
        <text x="60" y="18" font-size="11" font-weight="600" fill="#22D3EE" text-anchor="middle">In arrivo</text>
      </g>
      <text x="36" y="92" font-size="12" fill="#ffffff" fill-opacity="0.4" letter-spacing="0.2em">CLINICHE · FISIOTERAPISTI · DENTISTI</text>
      <text x="36" y="160" font-size="22" fill="#ffffff" fill-opacity="0.65">Il sistema medico.</text>
      <text x="36" y="200" font-size="14" fill="#ffffff" fill-opacity="0.45">Pensato per studi medici, conforme ai flussi clinici.</text>
    </g>

    <!-- Hermès -->
    <g transform="translate(840 360)" opacity="0.7">
      <rect width="760" height="320" rx="18" fill="#0A0A0A" stroke="#F59E0B" stroke-opacity="0.2"/>
      <rect width="760" height="320" rx="18" fill="#F59E0B" fill-opacity="0.03"/>
      <text x="36" y="60" font-size="28" font-weight="700" fill="#ffffff">Hermès</text>
      <g transform="translate(140 40)">
        <rect width="120" height="26" rx="13" fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-opacity="0.3"/>
        <text x="60" y="18" font-size="11" font-weight="600" fill="#F59E0B" text-anchor="middle">In arrivo</text>
      </g>
      <text x="36" y="92" font-size="12" fill="#ffffff" fill-opacity="0.4" letter-spacing="0.2em">B2B · FLUSSI INDUSTRIALI</text>
      <text x="36" y="160" font-size="22" fill="#ffffff" fill-opacity="0.65">Il layer industriale.</text>
      <text x="36" y="200" font-size="14" fill="#ffffff" fill-opacity="0.45">Orchestrazione B2B per flussi produzione e logistica.</text>
    </g>
  </g>
</svg>
