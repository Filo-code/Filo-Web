<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="phone" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="#030303"/>

  <g transform="translate(660 80)">
    <rect width="600" height="920" rx="56" fill="url(#phone)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <rect x="16" y="16" width="568" height="888" rx="44" fill="#0B141A"/>
    <rect x="16" y="16" width="568" height="90" rx="44" fill="#075E54"/>
    <rect x="16" y="60" width="568" height="46" fill="#075E54"/>
    <circle cx="80" cy="60" r="22" fill="#25D366"/>
    <text x="82" y="66" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">G</text>
    <text x="120" y="54" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Giulia Bianchi</text>
    <text x="120" y="76" font-family="Inter, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.7">online</text>

    <!-- Outgoing reminder -->
    <g transform="translate(110 160)">
      <rect width="460" height="180" rx="14" fill="#005C4B"/>
      <text x="20" y="36" font-family="Inter, sans-serif" font-size="16" fill="#ffffff">Ciao Giulia 💫 ti ricordiamo il</text>
      <text x="20" y="58" font-family="Inter, sans-serif" font-size="16" fill="#ffffff">tuo appuntamento:</text>
      <text x="20" y="92" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Balayage + Piega</text>
      <text x="20" y="118" font-family="Inter, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.85">Domani · 09:30</text>
      <text x="20" y="148" font-family="Inter, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.85">Rispondi OK per confermare.</text>
      <text x="420" y="168" font-family="Inter, sans-serif" font-size="11" text-anchor="end" fill="#ffffff" fill-opacity="0.6">18:00 ✓✓</text>
    </g>

    <!-- Reply -->
    <g transform="translate(50 360)">
      <rect width="120" height="48" rx="14" fill="#202C33"/>
      <text x="20" y="30" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#ffffff">OK ✨</text>
    </g>

    <!-- Confirmed tag -->
    <g transform="translate(50 430)">
      <rect width="220" height="32" rx="16" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-opacity="0.4"/>
      <circle cx="18" cy="16" r="4" fill="#10B981"/>
      <text x="32" y="22" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#10B981">Conferma registrata</text>
    </g>
  </g>

  <g transform="translate(160 940)" font-family="Inter, sans-serif">
    <text font-size="32" font-weight="600" fill="#ffffff">Promemoria automatici.</text>
    <text y="44" font-size="18" fill="#ffffff" fill-opacity="0.55">Meno no-show, più clienti in poltrona.</text>
  </g>
</svg>
