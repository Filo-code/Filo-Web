<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="phone" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="#030303"/>

  <!-- phone frame -->
  <g transform="translate(660 80)">
    <rect width="600" height="920" rx="56" fill="url(#phone)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <rect x="16" y="16" width="568" height="888" rx="44" fill="#075E54"/>
    <!-- WA header -->
    <rect x="16" y="16" width="568" height="90" rx="44" fill="#075E54"/>
    <rect x="16" y="60" width="568" height="46" fill="#075E54"/>
    <circle cx="80" cy="60" r="22" fill="#25D366"/>
    <text x="82" y="66" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">M</text>
    <text x="120" y="54" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Marco Verdi</text>
    <text x="120" y="76" font-family="Inter, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.7">online</text>

    <!-- chat bg -->
    <rect x="16" y="106" width="568" height="798" fill="#0B141A"/>

    <!-- Incoming bubble 1 -->
    <g transform="translate(50 150)">
      <rect width="400" height="70" rx="14" fill="#202C33"/>
      <text x="20" y="32" font-family="Inter, sans-serif" font-size="16" fill="#ffffff">Ciao, scusate — sono bloccato</text>
      <text x="20" y="54" font-family="Inter, sans-serif" font-size="16" fill="#ffffff">in riunione.</text>
    </g>

    <!-- Incoming bubble 2 -->
    <g transform="translate(50 240)">
      <rect width="460" height="100" rx="14" fill="#202C33"/>
      <text x="20" y="32" font-family="Inter, sans-serif" font-size="16" fill="#ffffff">Riesco a spostare l'appuntamento</text>
      <text x="20" y="54" font-family="Inter, sans-serif" font-size="16" fill="#ffffff">delle 11:15 di 15 minuti?</text>
      <text x="440" y="84" font-family="Inter, sans-serif" font-size="11" text-anchor="end" fill="#ffffff" fill-opacity="0.5">11:02</text>
    </g>

    <!-- typing indicator -->
    <g transform="translate(50 370)">
      <rect width="110" height="44" rx="22" fill="#202C33"/>
      <circle cx="30" cy="22" r="4" fill="#10B981"/>
      <circle cx="55" cy="22" r="4" fill="#10B981" fill-opacity="0.6"/>
      <circle cx="80" cy="22" r="4" fill="#10B981" fill-opacity="0.3"/>
    </g>
  </g>

  <!-- caption overlay -->
  <g transform="translate(160 940)" font-family="Inter, sans-serif">
    <text font-size="32" font-weight="600" fill="#ffffff">Un cliente scrive alle 11:02.</text>
    <text y="44" font-size="18" fill="#ffffff" fill-opacity="0.55">Tu sei col cliente in poltrona.</text>
  </g>
</svg>
