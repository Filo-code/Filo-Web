<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="gGlow" cx="90%" cy="10%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.14"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="#030303"/>

  <g transform="translate(260 160)">
    <rect width="1400" height="760" rx="24" fill="#0A0A0A" stroke="#ffffff" stroke-opacity="0.05"/>
    <rect width="1400" height="760" rx="24" fill="url(#gGlow)"/>

    <g transform="translate(40 40)" font-family="Inter, sans-serif">
      <text font-size="26" font-weight="600" fill="#ffffff" y="30">Impatto di Galatea · Questo mese</text>
      <text y="62" font-size="13" fill="#ffffff" fill-opacity="0.45" letter-spacing="0.2em">CUORE OPERATIVO · DATI REALI</text>
    </g>

    <!-- KPI cards -->
    <g transform="translate(40 140)" font-family="Inter, sans-serif">
      <!-- Card 1 -->
      <g>
        <rect width="320" height="220" rx="18" fill="#10B981" fill-opacity="0.05" stroke="#10B981" stroke-opacity="0.2"/>
        <text x="24" y="40" font-size="11" fill="#10B981" fill-opacity="0.75" letter-spacing="0.22em">PRENOTAZIONI AI</text>
        <text x="24" y="120" font-size="72" font-weight="700" fill="#ffffff">128</text>
        <text x="24" y="160" font-size="13" fill="#10B981">+14% vs mese scorso</text>
        <text x="24" y="190" font-size="12" fill="#ffffff" fill-opacity="0.45">Gestite senza intervento umano</text>
      </g>
      <!-- Card 2 -->
      <g transform="translate(340 0)">
        <rect width="320" height="220" rx="18" fill="#10B981" fill-opacity="0.05" stroke="#10B981" stroke-opacity="0.2"/>
        <text x="24" y="40" font-size="11" fill="#10B981" fill-opacity="0.75" letter-spacing="0.22em">ORE SALVATE</text>
        <text x="24" y="120" font-size="72" font-weight="700" fill="#ffffff">42<tspan font-size="36" fill-opacity="0.5">h</tspan></text>
        <text x="24" y="160" font-size="13" fill="#10B981">≈ 5 giorni di lavoro</text>
        <text x="24" y="190" font-size="12" fill="#ffffff" fill-opacity="0.45">Al telefono e in chat</text>
      </g>
      <!-- Card 3 -->
      <g transform="translate(680 0)">
        <rect width="320" height="220" rx="18" fill="#10B981" fill-opacity="0.05" stroke="#10B981" stroke-opacity="0.2"/>
        <text x="24" y="40" font-size="11" fill="#10B981" fill-opacity="0.75" letter-spacing="0.22em">NO-SHOW EVITATI</text>
        <text x="24" y="120" font-size="72" font-weight="700" fill="#ffffff">14</text>
        <text x="24" y="160" font-size="13" fill="#10B981">Grazie ai promemoria</text>
        <text x="24" y="190" font-size="12" fill="#ffffff" fill-opacity="0.45">Conferma in 1 click</text>
      </g>
      <!-- Card 4 impact -->
      <g transform="translate(1020 0)">
        <rect width="300" height="220" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
        <text x="24" y="40" font-size="11" fill="#ffffff" fill-opacity="0.55" letter-spacing="0.22em">IMPATTO STIMATO</text>
        <text x="24" y="120" font-size="56" font-weight="700" fill="#ffffff">€3.840</text>
        <text x="24" y="160" font-size="13" fill="#ffffff" fill-opacity="0.55">Fatturato recuperato</text>
        <text x="24" y="190" font-size="12" fill="#ffffff" fill-opacity="0.4">Stima sui dati reali</text>
      </g>
    </g>

    <!-- Bottom bar -->
    <g transform="translate(40 420)" font-family="Inter, sans-serif">
      <rect width="1320" height="280" rx="18" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05"/>
      <text x="30" y="50" font-size="13" fill="#ffffff" fill-opacity="0.55" letter-spacing="0.2em">ANDAMENTO SETTIMANALE</text>
      <!-- simple bars -->
      <g transform="translate(30 100)">
        <rect y="60" width="60" height="60" rx="6" fill="#10B981" fill-opacity="0.35"/>
        <rect x="90" y="40" width="60" height="80" rx="6" fill="#10B981" fill-opacity="0.45"/>
        <rect x="180" y="70" width="60" height="50" rx="6" fill="#10B981" fill-opacity="0.3"/>
        <rect x="270" y="20" width="60" height="100" rx="6" fill="#10B981" fill-opacity="0.55"/>
        <rect x="360" y="10" width="60" height="110" rx="6" fill="#10B981" fill-opacity="0.65"/>
        <rect x="450" y="30" width="60" height="90" rx="6" fill="#10B981" fill-opacity="0.5"/>
        <rect x="540" y="0" width="60" height="120" rx="6" fill="#10B981" fill-opacity="0.8"/>
      </g>
      <g transform="translate(30 240)" font-family="Inter, sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.4">
        <text x="30">LUN</text><text x="120">MAR</text><text x="210">MER</text><text x="300">GIO</text><text x="390">VEN</text><text x="480">SAB</text><text x="570">DOM</text>
      </g>
    </g>
  </g>

  <g transform="translate(160 970)" font-family="Inter, sans-serif">
    <text font-size="30" font-weight="600" fill="#ffffff">Risultati misurabili. Non promesse.</text>
  </g>
</svg>
