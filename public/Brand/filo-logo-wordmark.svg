<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 52" fill="none">
  <!--
    Filò Wordmark
    "Fil" + "o" in white, with a teal grave-accent flourish on the "ò".
    Font: modern geometric sans-serif (Inter/system-ui family).
  -->

  <!-- White letterforms: "Filo" -->
  <text
    x="6"
    y="38"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="36"
    font-weight="600"
    letter-spacing="-1.5"
    fill="white"
  >Filo</text>

  <!--
    Teal accent mark — grave accent over the "o".
    Positioned at the upper-right of the "o" glyph.
    Styled as the brand's signature teal flourish.
  -->
  <path
    d="M 124 28 L 117 10"
    stroke="#2DD4BF"
    stroke-width="3.5"
    stroke-linecap="round"
    opacity="0.95"
  />
</svg>
